query GetManagers($filter: ManagerFilter!) {
  managers(filter: $filter) {
    objects {
      validities {
        uuid
        org_unit {
          uuid
        }
        person {
          engagements(filter: { from_date: null, to_date: null }) {
            uuid
            org_unit {
              uuid
            }
            validity {
              from
              to
            }
          }
        }
        validity {
          from
          to
        }
      }
    }
  }
}

mutation TerminateManager(
  $uuid: UUID!
  $terminate_from: DateTime
  $terminate_to: DateTime!
) {
  manager_terminate(
    input: { uuid: $uuid, from: $terminate_from, to: $terminate_to }
  ) {
    uuid
  }
}

mutation UpdateManager(
  $uuid: UUID!
  $vacant_from: DateTime!
  $vacant_to: DateTime
) {
  manager_update(
    input: {
      uuid: $uuid
      validity: { from: $vacant_from, to: $vacant_to }
      person: null
    }
  ) {
    uuid
  }
}

query GetEngagementObjects($engagement_uuid: UUID!) {
  engagements(filter: { uuids: [$engagement_uuid] }) {
    objects {
      validities {
        org_unit {
          uuid
        }
        validity {
          from
          to
        }
        person {
          uuid
          engagements(filter: { from_date: null, to_date: null }) {
            uuid
            org_unit {
              uuid
            }
            validity {
              from
              to
            }
          }
          manager_roles {
            uuid
            org_unit {
              uuid
            }
            validity {
              from
              to
            }
          }
        }
      }
    }
  }
}

query GetEngagementObjectsByUuids($engagement_uuids: [UUID!]!) {
  engagements(
    filter: { uuids: $engagement_uuids, from_date: null, to_date: null }
  ) {
    objects {
      validities {
        uuid
        org_unit {
          uuid
        }
        person {
          uuid
        }
        validity {
          from
          to
        }
      }
    }
  }
}

